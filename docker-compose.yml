services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - /mnt/data/ai/ollama:/root/.ollama
    ports:
      - "11434:11434"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - /home/docker/volumes/qdrant/storage:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  cortex-mcp:
    image: ghcr.io/xoudusz/cortex-mcp:latest
    container_name: cortex-mcp
    restart: unless-stopped
    environment:
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - NOTES_PATH=/notes
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - BASE_URL=${BASE_URL:-https://cortex.hyvitech.org}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - REPOS_CONFIG=/app/data/repos.json
    volumes:
      - /home/docker/volumes/syncthing/notes:/notes:ro
      - /home/docker/volumes/cortex/config:/app/data
    ports:
      - "8765:8765"
    depends_on:
      - ollama
      - qdrant
