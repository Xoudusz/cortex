name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          VER=$(cat VERSION)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "major_minor=$(echo $VER | cut -d. -f1-2)" >> $GITHUB_OUTPUT

      - name: Check if version already released
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "new=false" >> $GITHUB_OUTPUT
          else
            echo "new=true" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker tags
        id: tags
        run: |
          VER="${{ steps.ver.outputs.version }}"
          MM="${{ steps.ver.outputs.major_minor }}"
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          TAGS="ghcr.io/xoudusz/cortex-mcp:latest,ghcr.io/xoudusz/cortex-mcp:sha-$SHA"
          if [ "${{ steps.check.outputs.new }}" = "true" ]; then
            TAGS="$TAGS,ghcr.io/xoudusz/cortex-mcp:$VER,ghcr.io/xoudusz/cortex-mcp:$MM"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push cortex-mcp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./mcp/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Tag and release
        if: steps.check.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$VER"
          git push origin "v$VER"

          python3 - << 'PYEOF'
import subprocess, os, re

ver = os.environ['VER']
repo = 'Xoudusz/cortex'

prev = subprocess.run(
    ['git', 'describe', '--tags', '--abbrev=0', 'HEAD~1'],
    capture_output=True, text=True,
)
prev_tag = prev.stdout.strip() if prev.returncode == 0 else ''

log_range = f'{prev_tag}..HEAD' if prev_tag else 'HEAD'
raw = subprocess.run(
    ['git', 'log', log_range, '--format=%s', '--no-merges'],
    capture_output=True, text=True,
).stdout.strip()

commits = [c for c in raw.split('\n') if c and not re.match(r'^chore: bump version', c, re.I)]

PREFIX_MAP = {
    'feat': 'Features', 'feature': 'Features',
    'fix': 'Fixes', 'bugfix': 'Fixes',
    'perf': 'Performance',
    'refactor': 'Refactoring',
    'ci': 'CI / Infra', 'build': 'CI / Infra', 'chore': 'CI / Infra',
    'docs': 'Docs', 'doc': 'Docs',
    'test': 'Tests', 'tests': 'Tests',
}
SECTION_ORDER = ['Features', 'Fixes', 'Performance', 'Refactoring', 'CI / Infra', 'Docs', 'Tests', 'Other']
sections = {s: [] for s in SECTION_ORDER}

for commit in commits:
    m = re.match(r'^(\w+)(?:\([^)]+\))?!?:\s*(.+)$', commit)
    if m:
        section = PREFIX_MAP.get(m.group(1).lower(), 'Other')
        msg = m.group(2).strip()
    else:
        section, msg = 'Other', commit.strip()
    sections[section].append(msg)

body = ''
for section in SECTION_ORDER:
    if sections[section]:
        body += f'## {section}\n'
        body += '\n'.join(f'- {item}' for item in sections[section])
        body += '\n\n'

if not body:
    body = 'Automated release.\n\n'

if prev_tag:
    body += f'**Full Changelog**: https://github.com/{repo}/compare/{prev_tag}...v{ver}\n'

with open('/tmp/release_notes.txt', 'w') as f:
    f.write(body.strip())
PYEOF

          gh release create "v$VER" --title "v$VER" --notes-file /tmp/release_notes.txt
