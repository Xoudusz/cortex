name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          VER=$(cat VERSION)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "major_minor=$(echo $VER | cut -d. -f1-2)" >> $GITHUB_OUTPUT

      - name: Check if version already released
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "new=false" >> $GITHUB_OUTPUT
          else
            echo "new=true" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker tags
        id: tags
        run: |
          VER="${{ steps.ver.outputs.version }}"
          MM="${{ steps.ver.outputs.major_minor }}"
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          TAGS="ghcr.io/xoudusz/cortex-mcp:latest,ghcr.io/xoudusz/cortex-mcp:sha-$SHA"
          if [ "${{ steps.check.outputs.new }}" = "true" ]; then
            TAGS="$TAGS,ghcr.io/xoudusz/cortex-mcp:$VER,ghcr.io/xoudusz/cortex-mcp:$MM"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push cortex-mcp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./mcp/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Tag and release
        if: steps.check.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.ver.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$VER"
          git push origin "v$VER"
          git log -1 --format='%B' > /tmp/release_notes.txt
          gh release create "v$VER" --title "v$VER" --notes-file /tmp/release_notes.txt
