name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push cortex-mcp
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./mcp/Dockerfile
          push: true
          tags: |
            ghcr.io/xoudusz/cortex-mcp:latest
            ghcr.io/xoudusz/cortex-mcp:${{ github.sha }}
