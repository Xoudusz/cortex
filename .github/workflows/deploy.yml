name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          VER=$(cat VERSION)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "major_minor=$(echo $VER | cut -d. -f1-2)" >> $GITHUB_OUTPUT

      - name: Check if version already released
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "new=false" >> $GITHUB_OUTPUT
          else
            echo "new=true" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker tags
        id: tags
        run: |
          VER="${{ steps.ver.outputs.version }}"
          MM="${{ steps.ver.outputs.major_minor }}"
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          TAGS="ghcr.io/xoudusz/cortex-mcp:latest,ghcr.io/xoudusz/cortex-mcp:sha-$SHA"
          if [ "${{ steps.check.outputs.new }}" = "true" ]; then
            TAGS="$TAGS,ghcr.io/xoudusz/cortex-mcp:$VER,ghcr.io/xoudusz/cortex-mcp:$MM"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push cortex-mcp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/mcp/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag and release
        if: steps.check.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$VER"
          git push origin "v$VER"

          PREV=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || true)
          RANGE="${PREV:+$PREV..HEAD}"
          RANGE="${RANGE:-HEAD}"

          feats="" fixes="" perfs="" refs="" ci="" docs="" tests="" other=""
          _CC_RE='^([a-z]+)(\([^)]+\))?!?:\ (.+)$'
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[Cc]hore:\ bump\ version ]] && continue
            if [[ "$line" =~ $_CC_RE ]]; then
              prefix="${BASH_REMATCH[1]}"
              msg="${BASH_REMATCH[3]}"
            else
              prefix=""
              msg="$line"
            fi
            case "$prefix" in
              feat|feature) feats="${feats}- $msg\n" ;;
              fix|bugfix)   fixes="${fixes}- $msg\n" ;;
              perf)         perfs="${perfs}- $msg\n" ;;
              refactor)     refs="${refs}- $msg\n" ;;
              ci|build|chore) ci="${ci}- $msg\n" ;;
              docs|doc)     docs="${docs}- $msg\n" ;;
              test|tests)   tests="${tests}- $msg\n" ;;
              *)            other="${other}- $line\n" ;;
            esac
          done < <(git log "$RANGE" --format='%s' --no-merges 2>/dev/null)

          body=""
          [ -n "$feats" ] && body="${body}## Features\n${feats}\n"
          [ -n "$fixes" ] && body="${body}## Fixes\n${fixes}\n"
          [ -n "$perfs" ] && body="${body}## Performance\n${perfs}\n"
          [ -n "$refs"  ] && body="${body}## Refactoring\n${refs}\n"
          [ -n "$ci"    ] && body="${body}## CI / Infra\n${ci}\n"
          [ -n "$docs"  ] && body="${body}## Docs\n${docs}\n"
          [ -n "$tests" ] && body="${body}## Tests\n${tests}\n"
          [ -n "$other" ] && body="${body}## Other\n${other}\n"
          [ -z "$body"  ] && body="Automated release.\n"
          [ -n "$PREV"  ] && body="${body}**Full Changelog**: https://github.com/Xoudusz/cortex/compare/${PREV}...v${VER}\n"

          printf "%b" "$body" > /tmp/release_notes.txt
          gh release create "v$VER" --title "v$VER" --notes-file /tmp/release_notes.txt

      - name: Build and publish cortex PyPI package
        if: steps.check.outputs.new == 'true'
        run: |
          pip install build
          python -m build local/
      - uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.check.outputs.new == 'true'
        with:
          packages-dir: local/dist/
